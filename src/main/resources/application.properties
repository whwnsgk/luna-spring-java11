spring.application.name=lol-inhouse-manager
server.port=${PORT:8081}
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
mybatis.mapper-locations=classpath:/mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
spring.sql.init.mode=never
management.endpoints.web.exposure.include=health
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
riot.api.key=${RIOT_API_KEY:}

riot.api.account-base-url=https://asia.api.riotgames.com
riot.api.platform-base-url=https://kr.api.riotgames.com
riot.api.match-base-url=https://asia.api.riotgames.com
riot.api.recent-match-count=20

# Discord Webhook은 선택 사항입니다. 비어 있으면 복사 기능만 사용합니다.
discord.webhook.url=${DISCORD_WEBHOOK_URL:}

